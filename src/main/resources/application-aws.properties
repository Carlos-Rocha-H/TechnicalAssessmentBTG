spring.application.name=btgpactual

# AWS - Endpoints reales (sin override, usa DefaultCredentialsProvider + ECS Task Role)
aws.region=${AWS_REGION:us-east-1}
aws.dynamodb.endpoint=
aws.ses.endpoint=
aws.sns.endpoint=
aws.ses.from=${SES_FROM_EMAIL:noreply@btgpactual.com}

# DynamoDB table names (inyectados via env vars del TaskDefinition)
aws.dynamodb.table.clients=${DYNAMODB_CLIENTS_TABLE:Clients}
aws.dynamodb.table.funds=${DYNAMODB_FUNDS_TABLE:Funds}
aws.dynamodb.table.transactions=${DYNAMODB_TRANSACTIONS_TABLE:Transactions}
aws.dynamodb.table.subscriptions=${DYNAMODB_SUBSCRIPTIONS_TABLE:Subscriptions}
aws.dynamodb.table.users=${DYNAMODB_USERS_TABLE:Users}

# JWT (valores inyectados via environment variables en ECS)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

logging.level.org.springframework.web=INFO
logging.level.software.amazon.awssdk=INFO
